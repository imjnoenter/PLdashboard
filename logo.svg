<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd6e7"/>
      <stop offset="100%" stop-color="#e3d9fb"/>
    </linearGradient>
    <radialGradient id="coin" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff7da"/>
      <stop offset="55%" stop-color="#ffe49a"/>
      <stop offset="100%" stop-color="#f0b94d"/>
    </radialGradient>
  </defs>

  <!-- App-icon shaped background -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- soft glow behind the coin -->
  <circle cx="256" cy="244" r="172" fill="#ffffff" opacity="0.35"/>

  <!-- rising P&L sparkline (behind the coin, gold-trading "profit" motif) -->
  <polyline points="118,332 196,300 244,326 304,256 352,278 398,206"
            fill="none" stroke="#6fd6a0" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="398" cy="206" r="11" fill="#6fd6a0"/>
  <!-- little uptrend arrowhead -->
  <path d="M398 206 l28 -8 l-6 28 z" fill="#6fd6a0" opacity="0.85"/>

  <!-- gold coin -->
  <circle cx="256" cy="270" r="104" fill="url(#coin)" stroke="#e0a23a" stroke-width="6"/>
  <circle cx="256" cy="270" r="84" fill="none" stroke="#fff7da" stroke-width="4" opacity="0.7"/>

  <!-- cute "$" glyph at coin center -->
  <text x="256" y="304" font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif" font-size="100" font-weight="800"
        text-anchor="middle" fill="#b9772a">$</text>

  <!-- cherry-blossom accent (ties to the app's 🌸 mark) -->
  <g transform="translate(140 138) scale(0.62)">
    <g fill="#ff8fb1" opacity="0.95">
      <ellipse cx="0" cy="-30" rx="20" ry="32" transform="rotate(0)"/>
      <ellipse cx="0" cy="-30" rx="20" ry="32" transform="rotate(72)"/>
      <ellipse cx="0" cy="-30" rx="20" ry="32" transform="rotate(144)"/>
      <ellipse cx="0" cy="-30" rx="20" ry="32" transform="rotate(216)"/>
      <ellipse cx="0" cy="-30" rx="20" ry="32" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="13" fill="#fff3c4" stroke="#ff8fb1" stroke-width="3"/>
  </g>

  <!-- sparkle accent -->
  <path d="M396 110 l9 22 l22 9 l-22 9 l-9 22 l-9 -22 l-22 -9 l22 -9 z" fill="#b9a3f5" opacity="0.85"/>
</svg>
